version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: burstdb-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-burstdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-burstdb}
      POSTGRES_DB: ${POSTGRES_DB:-burstdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: burstdb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: burstdb-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
